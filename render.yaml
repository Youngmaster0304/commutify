services:
  - type: web
    name: commutify-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node api/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMMA_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://commutify.vercel.app,https://*.vercel.app
    healthCheckPath: /api/stations
